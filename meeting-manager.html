<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週次ミーティング管理 | FRe:x Design inc.</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8; --bg2: #ede8df; --surface: #faf7f2; --surface2: #f0ebe0;
    --border: #d9d0c0; --border2: #c8bfae;
    --accent: #8b6f4e; --accent2: #a8845f; --accent-light: rgba(139,111,78,.1);
    --text: #2c2416; --text-muted: #7a6e5f;
    --akita: #4a7fa5; --akita-light: rgba(74,127,165,.12);
    --yokote: #d4845a; --yokote-light: rgba(212,132,90,.12);
    --danger: #b85450; --danger-light: rgba(184,84,80,.1);
    --success: #4a7a55; --success-light: rgba(74,122,85,.1);
    --notice: #7a5a9e; --notice-light: rgba(122,90,158,.1); --notice-border: rgba(122,90,158,.3);
    --leaders: #a78bc0; --leaders-light: rgba(167,139,192,.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(139,111,78,.08); }
  .logo { display: flex; align-items: baseline; gap: 12px; }
  .logo-main { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; }
  .logo-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; border-left: 1px solid var(--border2); padding-left: 12px; }
  .header-nav { display: flex; gap: 6px; align-items: center; }
  .nav-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; transition: all .2s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .nav-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 500; }
  .nav-btn-sm { padding: 7px 10px; }
  .admin-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all .2s; }
  .admin-btn:hover { border-color: var(--notice); color: var(--notice); background: var(--notice-light); }
  .admin-btn.active { border-color: var(--notice); color: var(--notice); background: var(--notice-light); }

  /* 管理者モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,36,22,.45); z-index: 300; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; box-shadow: 0 12px 48px rgba(44,36,22,.16); width: 90%; max-width: 360px; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.7; }
  .modal-btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-modal-cancel { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 9px 20px; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; }
  .btn-modal-cancel:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-modal-ok { background: var(--accent); color: #fff; border: none; padding: 9px 24px; border-radius: 8px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; font-size: 13px; }
  .btn-modal-ok:hover { background: var(--accent2); }
  .pw-error { color: var(--danger); font-size: 12px; margin-top: 6px; display: none; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .field input, .field textarea, .field select { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none; transition: border-color .2s; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }

  /* お知らせ */
  .notice-area { margin-bottom: 20px; background: var(--notice-light); border: 1px solid var(--notice-border); border-radius: 12px; overflow: hidden; }
  .notice-ticker-row { display: flex; align-items: center; height: 46px; }
  .notice-label { flex-shrink: 0; background: var(--notice); color: #fff; font-size: 12px; font-weight: 700; padding: 0 16px; height: 100%; display: flex; align-items: center; gap: 6px; letter-spacing: .5px; white-space: nowrap; }
  .notice-ticker-wrap { flex: 1; overflow: hidden; position: relative; height: 100%; }
  .notice-ticker-inner { display: flex; align-items: center; height: 100%; white-space: nowrap; animation: ticker-scroll 30s linear infinite; }
  .notice-ticker-inner:hover { animation-play-state: paused; }
  .notice-ticker-item { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); padding: 0 48px 0 0; }
  .notice-ticker-item .sep { color: var(--notice); margin-right: 48px; }
  @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .notice-empty-ticker { flex: 1; display: flex; align-items: center; padding: 0 20px; font-size: 13px; color: var(--text-muted); }
  .notice-admin-panel { border-top: 1px solid var(--notice-border); padding: 12px 16px; background: var(--surface); }
  .notice-list-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px dashed var(--notice-border); font-size: 13px; }
  .notice-list-item:last-of-type { border-bottom: none; }
  .notice-list-text { flex: 1; line-height: 1.6; color: var(--text); }
  .notice-list-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .notice-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 3px 6px; border-radius: 4px; transition: all .2s; }
  .notice-delete:hover { color: var(--danger); background: var(--danger-light); }
  .notice-edit-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 3px 6px; border-radius: 4px; transition: all .2s; }
  .notice-edit-btn:hover { color: var(--accent); background: var(--accent-light); }
  .notice-add-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: none; border: 1px dashed var(--notice-border); color: var(--notice); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; transition: all .2s; width: 100%; margin-top: 10px; }
  .notice-add-btn:hover { background: var(--notice-light); border-style: solid; }
  .notice-input-wrap { margin-top: 10px; }
  .notice-input-wrap textarea { width: 100%; background: var(--bg2); border: 1px solid var(--notice-border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none; resize: vertical; min-height: 70px; }
  .notice-input-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .btn-notice-cancel { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; }
  .btn-notice-post { background: var(--notice); color: #fff; border: none; padding: 7px 20px; border-radius: 6px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; font-size: 13px; }

  /* MAIN */
  .main { max-width: 1280px; margin: 0 auto; padding: 32px 28px; }

  /* OFFICE TABS */
  .office-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .office-tab { flex: 1; padding: 10px; text-align: center; border-radius: 7px; cursor: pointer; font-weight: 500; font-size: 14px; transition: all .2s; color: var(--text-muted); border: none; background: none; font-family: 'Noto Sans JP', sans-serif; }
  .office-tab.akita.active { background: var(--akita); color: #fff; }
  .office-tab.yokote.active { background: var(--yokote); color: #fff; }
  .office-tab.leaders.active { background: var(--leaders); color: #fff; }
  .office-tab:not(.active):hover { color: var(--text); background: var(--bg2); }

  /* MEETING LIST */
  .meeting-list { display: flex; flex-direction: column; gap: 12px; }
  .meeting-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s, box-shadow .2s; }
  .meeting-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(139,111,78,.08); }
  .office-stripe-akita { border-left: 3px solid var(--akita); }
  .office-stripe-yokote { border-left: 3px solid var(--yokote); }
  .meeting-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; cursor: pointer; gap: 12px; }
  .meeting-date { font-weight: 700; font-size: 15px; }
  .meeting-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .badge-akita { background: var(--akita-light); color: var(--akita); }
  .badge-yokote { background: var(--yokote-light); color: var(--yokote); }
  .card-actions { display: flex; align-items: center; gap: 6px; }
  .btn-edit { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; transition: all .2s; white-space: nowrap; }
  .btn-edit:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-copy { background: none; border: 1px solid var(--yokote); color: var(--yokote); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; transition: all .2s; white-space: nowrap; }
  .btn-copy:hover { background: var(--yokote-light); }
  .expand-icon { color: var(--text-muted); transition: transform .2s; font-size: 12px; }
  .expand-icon.open { transform: rotate(180deg); }
  .meeting-body { display: none; border-top: 1px solid var(--border); }
  .meeting-body.open { display: block; }
  .member-table-wrap { padding: 0 20px 20px; overflow-x: auto; }
  .member-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 16px; }
  .member-table th { text-align: left; padding: 8px 12px; background: var(--bg2); color: var(--text-muted); font-weight: 500; font-size: 11px; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  .member-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.6; }
  .member-table tr:last-child td { border-bottom: none; }
  .progress-bar { width: 120px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 5px; }
  .progress-fill { height: 100%; border-radius: 3px; }
  .prog-low { background: var(--danger); } .prog-mid { background: var(--accent); } .prog-high { background: var(--success); }
  .prog-val { font-size: 11px; color: var(--text-muted); }
  .meeting-note { padding: 12px 20px; background: var(--bg2); border-top: 1px solid var(--border); color: var(--text-muted); font-size: 12px; line-height: 1.8; }
  .meeting-note strong { color: var(--text); }

  /* FORM */
  .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; box-shadow: 0 2px 16px rgba(139,111,78,.06); }
  .page-bar { display: flex; align-items: center; margin-bottom: 24px; }
  .page-title { font-size: 20px; font-weight: 700; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
  .section-label { font-size: 12px; font-weight: 700; padding: 10px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 16px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .member-row { display: grid; grid-template-columns: 90px 1fr 80px 1fr; gap: 10px; align-items: start; padding: 12px 0; border-bottom: 1px dashed var(--border); }
  @media (max-width: 700px) { .member-row { grid-template-columns: 1fr 1fr; } }
  .member-name-label { display: flex; align-items: center; font-weight: 700; font-size: 13px; padding-top: 8px; }
  .field-sm label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .field-sm input, .field-sm textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none; }
  .field-sm textarea { resize: vertical; min-height: 60px; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 24px; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; }
  .btn-save { background: var(--accent); color: #fff; border: none; padding: 10px 28px; border-radius: 8px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; font-size: 14px; }
  .btn-save:hover { background: var(--accent2); }
  .btn-delete { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; margin-right: auto; }
  .btn-delete:hover { background: var(--danger-light); }

  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .alert-error { background: var(--danger-light); border: 1px solid var(--danger); color: var(--danger); }
  .alert-success { background: var(--success-light); border: 1px solid var(--success); color: var(--success); }
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* カスタムカレンダー */
  .date-picker-wrap { position: relative; }
  .date-display { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: border-color .2s; user-select: none; }
  .date-display:hover, .date-display.open { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .date-display .cal-icon { color: var(--text-muted); font-size: 15px; }
  .cal-popup { display: none; position: absolute; top: calc(100% + 6px); left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 32px rgba(44,36,22,.12); z-index: 200; padding: 16px; min-width: 280px; }
  .cal-popup.open { display: block; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-header-label { font-weight: 700; font-size: 14px; color: var(--text); }
  .cal-nav { background: none; border: 1px solid var(--border); color: var(--text-muted); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .cal-nav:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); padding: 4px 0 6px; }
  .cal-dow.sun { color: var(--danger); } .cal-dow.sat { color: var(--akita); }
  .cal-day { text-align: center; padding: 6px 2px; font-size: 13px; border-radius: 6px; cursor: pointer; transition: all .15s; color: var(--text); }
  .cal-day:hover { background: var(--accent-light); color: var(--accent); }
  .cal-day.other-month { color: var(--border2); pointer-events: none; }
  .cal-day.today { font-weight: 700; color: var(--accent); }
  .cal-day.selected { background: var(--accent); color: #fff !important; font-weight: 700; }
  .cal-day.thursday { background: var(--accent-light); }
  .cal-day.thursday.selected { background: var(--accent); }
  .cal-day.sunday { color: var(--danger); } .cal-day.saturday { color: var(--akita); }

  /* コピーモーダル */
  .code-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12px; white-space: pre-wrap; color: var(--accent); margin: 12px 0; max-height: 260px; overflow-y: auto; }

  /* リーダーズMTG */
  .leaders-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--leaders); border-radius: 10px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(167,139,192,.06); }
  .leaders-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--leaders-light); border-bottom: 1px solid var(--border); }
  .leaders-card-title { font-weight: 700; font-size: 15px; color: var(--leaders); }
  .leaders-card-date { font-size: 12px; color: var(--text-muted); }
  .leaders-card-body { padding: 20px; }
  .leaders-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 14px; margin-top: 20px; }
  .leaders-section-title:first-child { margin-top: 0; }
  .checklist-item { padding: 12px 0; border-bottom: 1px dashed var(--border); }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-row { display: flex; align-items: flex-start; gap: 12px; width: 100%; }
  .checklist-item input[type=checkbox] { width: 18px; height: 18px; accent-color: #6a3d9a; cursor: pointer; flex-shrink: 0; margin-top: 2px; }
  .checklist-item input[type=checkbox]:disabled { accent-color: #6a3d9a; cursor: default; opacity: 1; }

  .checklist-label { font-size: 14px; line-height: 1.6; color: var(--text); flex: 1; }

  .memo-area { margin-top: 10px; width: 100%; }
  .memo-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap; min-height: 60px; width: 100%; }
  .memo-box.empty-memo { color: var(--text-muted); font-style: italic; }
  textarea.memo-box { font-family: 'Noto Sans JP', sans-serif; resize: vertical; outline: none; transition: border-color .2s; }
  textarea.memo-box:focus { border-color: var(--leaders); box-shadow: 0 0 0 2px rgba(167,139,192,.2); }
  .memo-edit-wrap { margin-top: 8px; width: 100%; }
  .memo-edit-wrap textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none; resize: vertical; min-height: 80px; transition: border-color .2s; }
  .memo-edit-wrap textarea:focus { border-color: var(--leaders); }
  .memo-edit-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .btn-memo-edit { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; transition: all .2s; margin-top: 6px; }
  .btn-memo-edit:hover { border-color: var(--leaders); color: var(--leaders); }

  /* リーダーズ フォーム */
  .leaders-new-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--leaders); color: #fff; border: none; padding: 11px 24px; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; transition: background .2s; margin-bottom: 20px; }
  .leaders-new-btn:hover { background: #9070b0; }
  .leaders-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 20px; }
  .leaders-form-title { font-size: 16px; font-weight: 700; color: var(--leaders); margin-bottom: 20px; }
  .checklist-edit-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .checklist-edit-item input[type=text] { flex: 1; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none; }
  .checklist-edit-item input[type=text]:focus { border-color: var(--leaders); }
  .btn-remove-item { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px; }
  .btn-remove-item:hover { color: var(--danger); }
  .btn-add-item { background: none; border: 1px dashed var(--border); color: var(--text-muted); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; margin-top: 4px; }
  .btn-add-item:hover { border-color: var(--leaders); color: var(--leaders); }
</style>
</head>
<body>

<header class="header">
  <div class="logo">

/* 管理者 */
function toggleAdminMode(){
  if(isAdmin){
    isAdmin=false;
    document.getElementById('btn-admin').classList.remove('active');
    document.getElementById('btn-admin').title='管理者モード';
    loadNotices();
    if(currentOffice==='leaders') loadLeadersMTG();
  } else {
    requireAdmin(function(){
      document.getElementById('btn-admin').classList.add('active');
      document.getElementById('btn-admin').title='管理者モード中（クリックで解除）';
      loadNotices();
      if(currentOffice==='leaders') loadLeadersMTG();
    });
  }
}
function requireAdmin(cb){
  if(isAdmin){cb();return;}
  adminCallback=cb;
  document.getElementById('admin-pw-input').value='';
  document.getElementById('pw-error').style.display='none';
  document.getElementById('admin-modal').classList.add('open');
  setTimeout(function(){document.getElementById('admin-pw-input').focus();},100);
}
function checkAdminPw(){
  if(document.getElementById('admin-pw-input').value===ADMIN_PW){
    isAdmin=true;
    document.getElementById('admin-modal').classList.remove('open');
    if(adminCallback){adminCallback();adminCallback=null;}
  } else {
    document.getElementById('pw-error').style.display='block';
    document.getElementById('admin-pw-input').value='';
    document.getElementById('admin-pw-input').focus();
  }
}
function closeAdminModal(){document.getElementById('admin-modal').classList.remove('open');adminCallback=null;}

/* お知らせ */
function loadNotices(){
  if(!sbClient)return;
  sbClient.from('notices').select('*').order('created_at',{ascending:false}).then(function(res){
    if(res.error)return;
    renderNotices(res.data||[]);
  });
}
function renderNotices(notices){
  var tw=document.getElementById('notice-ticker-wrap');
  var ap=document.getElementById('notice-admin-panel');
  if(notices.length===0){
    tw.innerHTML='<div class="notice-empty-ticker">お知らせはありません</div>';
  } else {
    var items=notices.map(function(n){
      var t=n.title?'<strong>'+esc(n.title)+'</strong>　':'';
      return '<span class="notice-ticker-item">📢 '+t+esc(n.content)+'</span>';
    }).join('<span class="sep">｜</span>');
    var spd=Math.max(20,notices.length*12)+'s';
    tw.innerHTML='<div class="notice-ticker-inner" style="animation-duration:'+spd+';">'+items+'<span style="padding:0 48px;color:var(--notice);">｜</span>'+items+'</div>';
  }
  if(isAdmin){
    ap.style.display='block';
    var html='';
    if(notices.length===0) html+='<p style="font-size:13px;color:var(--text-muted);padding:4px 0;">お知らせはありません</p>';
    else notices.forEach(function(n){
      var d=new Date(n.created_at);
      var ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
      var te=(n.title||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var ce=(n.content||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+='<div class="notice-list-item"><div><div class="notice-list-text">'+(n.title?'<span style="font-weight:700;color:var(--notice);margin-right:6px;">'+esc(n.title)+'</span>':'')+esc(n.content)+'</div><div class="notice-list-date">'+ds+'</div></div>'
        +'<div style="display:flex;gap:4px;">'
        +'<button class="notice-edit-btn" onclick="editNotice(\''+n.id+'\',\''+te+'\',\''+ce+'\')">✏️</button>'
        +'<button class="notice-delete" onclick="deleteNotice(\''+n.id+'\')">✕</button>'
        +'</div></div>';
    });
    html+='<button class="notice-add-btn" id="notice-add-btn" onclick="showNoticeInput()">＋ お知らせを追加</button>';
    html+='<div class="notice-input-wrap" id="notice-input-wrap" style="display:none;">'
      +'<input type="text" id="notice-title" placeholder="題名" style="width:100%;background:var(--bg2);border:1px solid var(--notice-border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:\'Noto Sans JP\',sans-serif;font-size:13px;outline:none;margin-bottom:8px;">'
      +'<textarea id="notice-text" placeholder="内容を入力..." rows="3" style="width:100%;background:var(--bg2);border:1px solid var(--notice-border);color:var(--text);padding:10px 12px;border-radius:8px;font-family:\'Noto Sans JP\',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:70px;"></textarea>'
      +'<div class="notice-input-btns"><button class="btn-notice-cancel" onclick="hideNoticeInput()">キャンセル</button><button class="btn-notice-post" onclick="postNotice()">投稿する</button></div></div>';
    ap.innerHTML=html;
  } else { ap.style.display='none'; }
}
function showNoticeInput(){var el=document.getElementById('notice-input-wrap');if(el){el.style.display='block';document.getElementById('notice-title').focus();}}
function hideNoticeInput(){var el=document.getElementById('notice-input-wrap');if(el)el.style.display='none';}
function postNotice(){
  var title=(document.getElementById('notice-title').value||'').trim();
  var text=(document.getElementById('notice-text').value||'').trim();
  if(!text){alert('内容を入力してください。');return;}
  sbClient.from('notices').insert({title:title||null,content:text}).then(function(res){if(!res.error)loadNotices();});
}
function deleteNotice(id){
  if(!confirm('このお知らせを削除しますか？'))return;
  sbClient.from('notices').delete().eq('id',id).then(function(res){if(!res.error)loadNotices();});
}
function editNotice(id,currentTitle,currentContent){
  var item=event.target.closest('.notice-list-item');
  if(!item)return;
  item.innerHTML='<div style="width:100%;">'
    +'<input type="text" id="edit-title-'+id+'" value="'+currentTitle.replace(/"/g,'&quot;')+'" placeholder="題名" style="width:100%;background:var(--bg2);border:1px solid var(--notice-border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:\'Noto Sans JP\',sans-serif;font-size:13px;outline:none;margin-bottom:8px;">'
    +'<textarea id="edit-content-'+id+'" rows="3" style="width:100%;background:var(--bg2);border:1px solid var(--notice-border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:\'Noto Sans JP\',sans-serif;font-size:13px;outline:none;resize:vertical;">'+currentContent+'</textarea>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">'
    +'<button class="btn-notice-cancel" onclick="loadNotices()">キャンセル</button>'
    +'<button class="btn-notice-post" onclick="saveNoticeEdit(\''+id+'\')">保存する</button>'
    +'</div></div>';
  document.getElementById('edit-title-'+id).focus();
}
function saveNoticeEdit(id){
  var title=(document.getElementById('edit-title-'+id).value||'').trim();
  var content=(document.getElementById('edit-content-'+id).value||'').trim();
  if(!content){alert('内容を入力してください。');return;}
  sbClient.from('notices').update({title:title||null,content:content}).eq('id',id).then(function(res){
    if(res.error){alert('更新エラー: '+res.error.message);return;}
    loadNotices();
  });
}

/* カレンダー共通 */
function buildCalGrid(year,month,selected,labelId,gridId,pickFn){
  var DAYS=['日','月','火','水','木','金','土'],today=new Date();today.setHours(0,0,0,0);
  document.getElementById(labelId).textContent=year+'年 '+(month+1)+'月';
  var html='',dc=['sun','','','','','','sat'];
  for(var i=0;i<7;i++) html+='<div class="cal-dow '+dc[i]+'">'+DAYS[i]+'</div>';
  var fd=new Date(year,month,1).getDay(),ld=new Date(year,month+1,0).getDate(),pl=new Date(year,month,0).getDate();
  for(var i=0;i<fd;i++) html+='<div class="cal-day other-month">'+(pl-fd+1+i)+'</div>';
  for(var d=1;d<=ld;d++){
    var dt=new Date(year,month,d),dow=dt.getDay();
    var mm=String(month+1).padStart(2,'0'),dd=String(d).padStart(2,'0'),ds=year+'-'+mm+'-'+dd;
    var cls='cal-day';
    if(dow===0)cls+=' sunday';if(dow===6)cls+=' saturday';
    if(dow===4)cls+=' thursday';
    if(dt.getTime()===today.getTime())cls+=' today';
    if(ds===selected)cls+=' selected';
    html+='<div class="'+cls+'" onclick="'+pickFn+'('+year+','+(month+1)+','+d+')">'+d+'</div>';
  }
  var total=fd+ld,rem=total%7===0?0:7-(total%7);
  for(var i=1;i<=rem;i++) html+='<div class="cal-day other-month">'+i+'</div>';
  document.getElementById(gridId).innerHTML=html;
}
function initCal(){var t=new Date(),dw=t.getDay(),l=new Date(t);l.setDate(t.getDate()-(dw>=4?dw-4:dw+3));calYear=l.getFullYear();calMonth=l.getMonth();setSelectedDate(l.getFullYear(),l.getMonth()+1,l.getDate());}
function setSelectedDate(y,m,d){var mm=String(m).padStart(2,'0'),dd=String(d).padStart(2,'0');selectedDate=y+'-'+mm+'-'+dd;document.getElementById('f-date').value=selectedDate;document.getElementById('date-display-text').textContent=y+'年'+m+'月'+d+'日';renderCalGrid();}
function toggleCal(){var p=document.getElementById('cal-popup'),dp=document.getElementById('date-display');if(p.classList.contains('open')){closeCal();}else{p.classList.add('open');dp.classList.add('open');renderCalGrid();}}
function closeCal(){document.getElementById('cal-popup').classList.remove('open');document.getElementById('date-display').classList.remove('open');}
function calMove(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalGrid();}
function renderCalGrid(){buildCalGrid(calYear,calMonth,selectedDate,'cal-header-label','cal-grid','pickDate');}
function pickDate(y,m,d){calYear=y;calMonth=m-1;setSelectedDate(y,m,d);closeCal();}
function initCopyCal(){var t=new Date(),dw=t.getDay(),n=new Date(t);n.setDate(t.getDate()+(dw<=4?4-dw:11-dw));copyCalYear=n.getFullYear();copyCalMonth=n.getMonth();setCopySelectedDate(n.getFullYear(),n.getMonth()+1,n.getDate());}
function setCopySelectedDate(y,m,d){var mm=String(m).padStart(2,'0'),dd=String(d).padStart(2,'0');copySelectedDate=y+'-'+mm+'-'+dd;document.getElementById('copy-date-text').textContent=y+'年'+m+'月'+d+'日';renderCopyCalGrid();}
function toggleCopyCal(){var p=document.getElementById('copy-cal-popup'),dp=document.getElementById('copy-date-display');if(p.classList.contains('open')){closeCopyCal();}else{p.classList.add('open');dp.classList.add('open');renderCopyCalGrid();}}
function closeCopyCal(){document.getElementById('copy-cal-popup').classList.remove('open');document.getElementById('copy-date-display').classList.remove('open');}
function copyCalMove(dir){copyCalMonth+=dir;if(copyCalMonth>11){copyCalMonth=0;copyCalYear++;}if(copyCalMonth<0){copyCalMonth=11;copyCalYear--;}renderCopyCalGrid();}
function renderCopyCalGrid(){buildCalGrid(copyCalYear,copyCalMonth,copySelectedDate,'copy-cal-label','copy-cal-grid','pickCopyDate');}
function pickCopyDate(y,m,d){copyCalYear=y;copyCalMonth=m-1;setCopySelectedDate(y,m,d);closeCopyCal();}

/* APP */
function showPage(p){
  document.getElementById('app-main').style.display='block';
  document.getElementById('page-list').style.display=(p==='list')?'block':'none';
  document.getElementById('page-new').style.display=(p==='new')?'block':'none';
  ['btn-list','btn-new'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  if(p==='list'){document.getElementById('btn-list').classList.add('active');loadMeetings();loadNotices();}
  if(p==='new') document.getElementById('btn-new').classList.add('active');
}
function startNew(){editingId=null;document.getElementById('form-page-title').textContent='新規ミーティング入力';document.getElementById('btn-delete').style.display='none';document.getElementById('f-office').disabled=false;initCal();renderMemberFields();showPage('new');}
function setOffice(office,el){
  currentOffice=office;
  document.querySelectorAll('.office-tab').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  var isl=(office==='leaders');
  document.getElementById('meeting-list').style.display=isl?'none':'block';
  document.getElementById('page-leaders').style.display=isl?'block':'none';
  if(isl) loadLeadersMTG();
  else loadMeetings();
}
function loadMeetings(){
  var le=document.getElementById('meeting-list');
  le.innerHTML='<div class="empty"><span class="spinner"></span> 読み込み中...</div>';
  sbClient.from('meetings').select('*, meeting_members(*)').eq('office',currentOffice).order('meeting_date',{ascending:false}).then(function(res){
    if(res.error)throw res.error;
    var m=res.data;
    if(!m||m.length===0){le.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">まだ記録がありません</div></div>';return;}
    le.innerHTML=m.map(function(x){return renderCard(x);}).join('');
  }).catch(function(e){showAlert('list-alert','error','データ取得エラー: '+(e.message||e));le.innerHTML='';});
}
function renderCard(m){
  var d=new Date(m.meeting_date+'T00:00:00');
  var ds=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（木）';
  var ol=m.office==='akita'?'秋田事業所':'横手事業所';
  var bc=m.office==='akita'?'badge-akita':'badge-yokote';
  var sc='office-stripe-'+m.office;
  var mems=m.meeting_members||[],order=MEMBERS[m.office]||[];
  mems.sort(function(a,b){return order.indexOf(a.member_name)-order.indexOf(b.member_name);});
  var rows=mems.map(function(mem){
    var p=mem.progress||0,pc=p>=80?'prog-high':p>=40?'prog-mid':'prog-low';
    return '<tr><td><strong>'+esc(mem.member_name)+'</strong></td><td>'+esc(mem.current_work||'—')+'</td><td><div class="prog-val">'+p+'%</div><div class="progress-bar"><div class="progress-fill '+pc+'" style="width:'+p+'%"></div></div></td><td>'+esc(mem.next_plan||'—')+'</td></tr>';
  }).join('');
  var note=m.note?'<div class="meeting-note"><strong>📌 メモ：</strong> '+esc(m.note)+'</div>':'';
  return '<div class="meeting-card '+sc+'"><div class="meeting-card-header" onclick="toggleCard(\'card-'+m.id+'\')">'
    +'<div><div class="meeting-date">'+ds+'</div></div>'
    +'<span class="meeting-badge '+bc+'">'+ol+'</span>'
    +'<div class="card-actions">'
    +'<button class="btn-copy" onclick="event.stopPropagation();openCopyModal(\''+m.id+'\')">📋 コピーして作成</button>'
    +'<button class="btn-edit" onclick="event.stopPropagation();startEdit(\''+m.id+'\')">✏️ 編集</button>'
    +'<span class="expand-icon" id="icon-card-'+m.id+'">▼</span>'
    +'</div></div>'
    +'<div class="meeting-body" id="card-'+m.id+'">'
    +'<div class="member-table-wrap"><table class="member-table"><thead><tr><th>氏名</th><th>今週の作業状況</th><th>進捗率</th><th>来週の作業予定</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +note+'</div></div>';
}
function toggleCard(id){document.getElementById(id).classList.toggle('open');document.getElementById('icon-'+id).classList.toggle('open');}
function openCopyModal(id){
  sbClient.from('meetings').select('*, meeting_members(*)').eq('id',id).single().then(function(res){
    if(res.error)throw res.error;
    copySourceData=res.data;initCopyCal();
    document.getElementById('copy-modal').classList.add('open');
  }).catch(function(e){showAlert('list-alert','error','エラー: '+(e.message||e));});
}
function closeModal(){document.getElementById('copy-modal').classList.remove('open');copySourceData=null;copySelectedDate='';}
function executeCopy(){
  if(!copySourceData||!copySelectedDate){alert('日付を選択してください。');return;}
  var m=copySourceData;
  sbClient.from('meetings').insert({office:m.office,meeting_date:copySelectedDate,note:m.note}).select().single().then(function(r1){
    if(r1.error)throw r1.error;
    return sbClient.from('meeting_members').insert((m.meeting_members||[]).map(function(mem){return {meeting_id:r1.data.id,member_name:mem.member_name,current_work:mem.current_work,progress:mem.progress,next_plan:mem.next_plan};}));
  }).then(function(r2){
    if(r2.error)throw r2.error;
    closeModal();showAlert('list-alert','success','✅ コピーして作成しました！');loadMeetings();
  }).catch(function(e){showAlert('list-alert','error','コピーエラー: '+(e.message||e));});
}
function startEdit(id){
  sbClient.from('meetings').select('*, meeting_members(*)').eq('id',id).single().then(function(res){
    if(res.error)throw res.error;
    var m=res.data;editingId=id;
    document.getElementById('form-page-title').textContent='✏️ ミーティング編集';
    document.getElementById('btn-delete').style.display='inline-block';
    document.getElementById('f-office').value=m.office;
    document.getElementById('f-office').disabled=true;
    var p=m.meeting_date.split('-');
    calYear=parseInt(p[0]);calMonth=parseInt(p[1])-1;
    setSelectedDate(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]));
    document.getElementById('f-note').value=m.note||'';
    renderMemberFields();
    (m.meeting_members||[]).forEach(function(mem){
      var w=document.getElementById('work-'+mem.member_name);
      var pg=document.getElementById('prog-'+mem.member_name);
      var n=document.getElementById('next-'+mem.member_name);
      if(w)w.value=mem.current_work||'';if(pg)pg.value=mem.progress||0;if(n)n.value=mem.next_plan||'';
    });
    showPage('new');
  }).catch(function(e){showAlert('list-alert','error','編集エラー: '+(e.message||e));});
}
function renderMemberFields(){
  var office=document.getElementById('f-office').value,mems=MEMBERS[office];
  var label=office==='akita'?'秋田事業所':'横手事業所';
  document.getElementById('members-section-label').textContent='👥 '+label+' メンバー別作業状況';
  document.getElementById('member-fields').innerHTML=mems.map(function(name){
    return '<div class="member-row"><div class="member-name-label">'+name+'</div>'
      +'<div class="field-sm"><label>今週の作業状況</label><textarea id="work-'+name+'" rows="2"></textarea></div>'
      +'<div class="field-sm"><label>進捗率 (%)</label><input type="number" id="prog-'+name+'" min="0" max="100" value="0"></div>'
      +'<div class="field-sm"><label>来週の作業予定</label><textarea id="next-'+name+'" rows="2"></textarea></div>'
      +'</div>';
  }).join('');
}
function saveMeeting(){
  var office=document.getElementById('f-office').value,date=document.getElementById('f-date').value,note=document.getElementById('f-note').value.trim();
  if(!date){showAlert('new-alert','error','日付を選択してください。');return;}
  var members=MEMBERS[office].map(function(name){
    return {member_name:name,current_work:(document.getElementById('work-'+name).value||'').trim(),progress:parseInt(document.getElementById('prog-'+name).value||'0'),next_plan:(document.getElementById('next-'+name).value||'').trim()};
  });
  if(editingId){
    sbClient.from('meetings').update({meeting_date:date,note:note}).eq('id',editingId).then(function(r1){
      if(r1.error)throw r1.error;
      return sbClient.from('meeting_members').delete().eq('meeting_id',editingId);
    }).then(function(r2){
      if(r2.error)throw r2.error;
      return sbClient.from('meeting_members').insert(members.map(function(m){return Object.assign({},m,{meeting_id:editingId});}));
    }).then(function(r3){
      if(r3.error)throw r3.error;
      showAlert('new-alert','success','✅ 更新しました！');editingId=null;
      setTimeout(function(){showPage('list');},1000);
    }).catch(function(e){showAlert('new-alert','error','更新エラー: '+(e.message||e));});
  } else {
    sbClient.from('meetings').insert({office:office,meeting_date:date,note:note}).select().single().then(function(r1){
      if(r1.error)throw r1.error;
      return sbClient.from('meeting_members').insert(members.map(function(m){return Object.assign({},m,{meeting_id:r1.data.id});}));
    }).then(function(r2){
      if(r2.error)throw r2.error;
      showAlert('new-alert','success','✅ 保存しました！');
      setTimeout(function(){document.getElementById('f-note').value='';renderMemberFields();initCal();editingId=null;showPage('list');},1000);
    }).catch(function(e){showAlert('new-alert','error','保存エラー: '+(e.message||e));});
  }
}
function deleteMeeting(){
  if(!editingId)return;
  if(!confirm('このミーティング記録を削除しますか？'))return;
  sbClient.from('meetings').delete().eq('id',editingId).then(function(res){
    if(res.error)throw res.error;editingId=null;showPage('list');
  }).catch(function(e){showAlert('new-alert','error','削除エラー: '+(e.message||e));});
}

/* リーダーズMTG */
function loadLeadersMTG(){
  var cont=document.getElementById('leaders-content');
  cont.innerHTML='<div class="empty"><span class="spinner"></span> 読み込み中...</div>';
  sbClient.from('leaders_mtg').select('*, leaders_checklist(*)').order('mtg_date',{ascending:false}).then(function(res){
    if(res.error){cont.innerHTML='<div class="empty">読み込みエラー: '+res.error.message+'</div>';return;}
    var records=res.data||[];
    if(records.length===0){renderLeadersMTG([]);return;}
    var allIds=[];
    records.forEach(function(r){(r.leaders_checklist||[]).forEach(function(item){allIds.push(item.id);});});
    if(allIds.length===0){renderLeadersMTG(records);return;}
    sbClient.from('leaders_memo').select('*').in('checklist_id',allIds).then(function(mr){
      var memoMap={};
      (mr.data||[]).forEach(function(m){memoMap[m.checklist_id]=m;});
      records.forEach(function(r){
        (r.leaders_checklist||[]).forEach(function(item){
          item.memo=memoMap[item.id]||null;
        });
      });
      renderLeadersMTG(records);
    });
  });
}

function renderLeadersMTG(records){
  var cont=document.getElementById('leaders-content');
  var html='';
  if(isAdmin){
    html+='<button class="leaders-new-btn" onclick="showLeadersForm()">＋ 新規リーダーズMTG作成</button>';
    html+='<div id="leaders-form-wrap" style="display:none;"></div>';
  }
  if(records.length===0){
    html+='<div class="empty"><div class="empty-icon">👑</div><div class="empty-title">まだ記録がありません</div></div>';
  } else {
    records.forEach(function(r){
      var d=new Date(r.mtg_date+'T00:00:00');
      var ds=d.getFullYear()+'年'+(d.getMonth()+1)+'月';
      var checklist=(r.leaders_checklist||[]).sort(function(a,b){return a.sort_order-b.sort_order;});
      var checkHtml=checklist.map(function(item){
        var memo=item.memo||null;
        var memoContent=memo&&memo.content?memo.content:'';
        var cls=item.checked?'checklist-label checked':'checklist-label';
        var chkAttr=isAdmin?' onclick="toggleCheck(\''+item.id+'\',this)"':' disabled';
        var memoDisp='<div class="memo-area">';
        if(isAdmin){
          memoDisp+='<textarea class="memo-box" id="memo-ta-'+item.id+'" data-memo-id="'+(memo?memo.id:'')+'" rows="4" placeholder="メモを入力...">'+memoContent+'</textarea>';
        } else {
          memoDisp+='<div class="memo-box '+(memoContent?'':'empty-memo')+'">'+(memoContent?esc(memoContent):'メモなし')+'</div>';
        }
        memoDisp+='</div>';
        return '<div class="checklist-item">'
          +'<div class="checklist-row">'
          +'<input type="checkbox" '+(item.checked?'checked':'')+chkAttr+'>'
          +'<span class="'+cls+'" id="cl-label-'+item.id+'">'+esc(item.label)+'</span>'
          +'</div>'
          +memoDisp
          +'</div>';
      }).join('');

      // 管理者の場合、カード下部に全メモ保存ボタンを1つ
      var saveMemoBtn = isAdmin
        ? '<div style="padding:0 0 16px;display:flex;justify-content:flex-end;">'
          +'<button class="btn-save" style="font-size:13px;" onclick="saveAllMemos(\''+r.id+'\')">💾 メモを保存する</button>'
          +'</div>'
        : '';
      var editBtns=isAdmin
        ?'<button class="btn-edit" onclick="showEditLeadersForm(\''+r.id+'\')">✏️ 編集</button>'
         +'<button class="btn-edit" style="border-color:var(--danger);color:var(--danger);" onclick="deleteLeadersMTG(\''+r.id+'\')">🗑 削除</button>'
        :'';
      html+='<div class="leaders-card">'
        +'<div class="leaders-card-header" onclick="toggleLeadersCard(\'lc-'+r.id+'\')" style="cursor:pointer;">'
        +'<div class="leaders-card-title">👑 '+ds+' リーダーズMTG</div>'
        +'<div style="display:flex;align-items:center;gap:8px;">'+editBtns+'<span class="leaders-card-date">'+r.mtg_date+'</span><span class="expand-icon" id="icon-lc-'+r.id+'">▼</span></div>'
        +'</div>'
        +'<div class="meeting-body" id="lc-'+r.id+'">'
        +'<div class="leaders-card-body" id="leaders-body-'+r.id+'">'
        +'<div class="leaders-section-title">✅ 確認事項 / メモ</div>'
        +(checkHtml||'<p style="font-size:13px;color:var(--text-muted);">確認事項なし</p>')
        +saveMemoBtn
        +'</div></div></div>';
    });
  }
  cont.innerHTML=html;
}

function showLeadersForm(){
  var wrap=document.getElementById('leaders-form-wrap');
  wrap.style.display='block';
  var today=new Date();
  var dv=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  wrap.innerHTML='<div class="leaders-form">'
    +'<div class="leaders-form-title">新規リーダーズMTG作成</div>'
    +'<div class="field"><label>開催日</label><input type="date" id="lf-date" value="'+dv+'"></div>'
    +'<div class="leaders-section-title">✅ 確認事項</div>'
    +'<div id="lf-items"></div>'
    +'<button class="btn-add-item" onclick="addCheckItem(\'lf-items\')">＋ 項目を追加</button>'
    +'<div class="btn-row" style="margin-top:20px;">'
    +'<button class="btn-cancel" onclick="hideLeadersForm()">キャンセル</button>'
    +'<button class="btn-save" onclick="saveLeadersMTG()">💾 保存する</button>'
    +'</div></div>';
  addCheckItem('lf-items');
}
function hideLeadersForm(){var w=document.getElementById('leaders-form-wrap');if(w)w.style.display='none';}
function showEditLeadersForm(mtgId){
  sbClient.from('leaders_mtg').select('*, leaders_checklist(*)').eq('id',mtgId).single().then(function(res){
    if(res.error){alert('読み込みエラー');return;}
    var r=res.data;
    var checklist=(r.leaders_checklist||[]).sort(function(a,b){return a.sort_order-b.sort_order;});
    var body=document.getElementById('leaders-body-'+mtgId);
    var itemsHtml=checklist.map(function(item){
      return '<div class="checklist-edit-item" id="ef-item-'+item.id+'" data-existing-id="'+item.id+'">'
        +'<input type="text" value="'+item.label.replace(/"/g,'&quot;')+'" id="ef-label-'+item.id+'">'
        +'<button class="btn-remove-item" onclick="removeCheckItem(\'ef-item-'+item.id+'\')">✕</button>'
        +'</div>';
    }).join('');
    body.innerHTML='<div style="padding:4px 0;">'
      +'<div class="leaders-section-title">✅ 確認事項を編集</div>'
      +'<div id="ef-items-'+mtgId+'">'+itemsHtml+'</div>'
      +'<button class="btn-add-item" onclick="addCheckItem(\'ef-items-'+mtgId+'\')">＋ 項目を追加</button>'
      +'<div class="btn-row" style="margin-top:16px;">'
      +'<button class="btn-cancel" onclick="loadLeadersMTG()">キャンセル</button>'
      +'<button class="btn-save" onclick="saveEditLeaders(\''+mtgId+'\')">💾 保存する</button>'
      +'</div></div>';
  });
}
function saveEditLeaders(mtgId){
  // 既存チェックリストとメモを取得してから更新
  sbClient.from('leaders_checklist').select('id,label').eq('mtg_id',mtgId).then(function(er){
    var existItems=er.data||[];
    var existIds=existItems.map(function(x){return x.id;});
    if(existIds.length===0) return Promise.resolve({existItems:[],memos:[]});
    return sbClient.from('leaders_memo').select('*').in('checklist_id',existIds).then(function(mr){
      return {existItems:existItems,memos:mr.data||[]};
    });
  }).then(function(prev){
    var items=[];
    document.querySelectorAll('#ef-items-'+mtgId+' .checklist-edit-item').forEach(function(el,i){
      var inp=el.querySelector('input[type=text]');
      if(inp&&inp.value.trim()) items.push({label:inp.value.trim(),sort_order:i});
    });
    return sbClient.from('leaders_checklist').delete().eq('mtg_id',mtgId).then(function(r1){
      if(r1.error)throw r1.error;
      if(items.length===0){loadLeadersMTG();return;}
      return sbClient.from('leaders_checklist').insert(items.map(function(item){
        return {mtg_id:mtgId,label:item.label,sort_order:item.sort_order,checked:false};
      })).select().then(function(r2){
        if(r2.error)throw r2.error;
        // 同じlabelのメモを新IDに紐づけて復元
        var inserts=[];
        (r2.data||[]).forEach(function(newItem){
          var old=prev.existItems.find(function(x){return x.label===newItem.label;});
          if(old){
            var memo=prev.memos.find(function(m){return m.checklist_id===old.id;});
            if(memo&&memo.content) inserts.push({checklist_id:newItem.id,content:memo.content});
          }
        });
        if(inserts.length===0) return;
        return sbClient.from('leaders_memo').insert(inserts);
      });
    });
  }).then(function(){
    showAlert('leaders-alert','success','✅ 確認事項を更新しました！');
    loadLeadersMTG();
  }).catch(function(e){alert('更新エラー: '+(e.message||e));});
}
function saveAllMemos(mtgId){
  var body=document.getElementById('leaders-body-'+mtgId);
  if(!body)return;
  var textareas=body.querySelectorAll('textarea.memo-box');
  var promises=[];
  textareas.forEach(function(ta){
    var itemId=ta.id.replace('memo-ta-','');
    var memoId=ta.getAttribute('data-memo-id')||null;
    var content=ta.value.trim();
    if(memoId){
      promises.push(sbClient.from('leaders_memo').update({content:content}).eq('id',memoId));
    } else {
      promises.push(
        sbClient.from('leaders_memo').insert({checklist_id:itemId,content:content}).select().single().then(function(res){
          if(res.data) ta.setAttribute('data-memo-id',res.data.id);
          return res;
        })
      );
    }
  });
  Promise.all(promises).then(function(){
    showAlert('leaders-alert','success','✅ メモを保存しました！');
  }).catch(function(e){alert('保存エラー: '+(e.message||e));});
}
function addCheckItem(containerId){
  var cont=document.getElementById(containerId);if(!cont)return;
  var idx=Date.now();
  var div=document.createElement('div');
  div.className='checklist-edit-item';div.id='lf-item-'+idx;
  div.innerHTML='<input type="text" placeholder="確認事項を入力..." id="lf-label-'+idx+'">'
    +'<button class="btn-remove-item" onclick="removeCheckItem(\'lf-item-'+idx+'\')">✕</button>';
  cont.appendChild(div);
  document.getElementById('lf-label-'+idx).focus();
}
function removeCheckItem(id){var el=document.getElementById(id);if(el)el.remove();}
function saveLeadersMTG(){
  var date=document.getElementById('lf-date').value;
  if(!date){alert('開催日を入力してください。');return;}
  var items=[];
  document.querySelectorAll('#lf-items .checklist-edit-item').forEach(function(el,i){
    var inp=el.querySelector('input[type=text]');
    if(inp&&inp.value.trim()) items.push({label:inp.value.trim(),sort_order:i,checked:false});
  });
  sbClient.from('leaders_mtg').insert({mtg_date:date}).select().single().then(function(r1){
    if(r1.error)throw r1.error;
    if(items.length===0){hideLeadersForm();showAlert('leaders-alert','success','✅ 作成しました！');loadLeadersMTG();return;}
    return sbClient.from('leaders_checklist').insert(items.map(function(item){return Object.assign({},item,{mtg_id:r1.data.id});}));
  }).then(function(r2){
    if(r2&&r2.error)throw r2.error;
    hideLeadersForm();showAlert('leaders-alert','success','✅ リーダーズMTGを作成しました！');loadLeadersMTG();
  }).catch(function(e){alert('保存エラー: '+(e.message||e));});
}
function deleteLeadersMTG(id){
  if(!confirm('このリーダーズMTGを削除しますか？'))return;
  sbClient.from('leaders_mtg').delete().eq('id',id).then(function(res){
    if(res.error){alert('削除エラー: '+res.error.message);return;}
    loadLeadersMTG();
  });
}
function toggleLeadersCard(id){
  document.getElementById(id).classList.toggle('open');
  document.getElementById('icon-'+id).classList.toggle('open');
}
function toggleCheck(itemId,checkbox){
  var checked=checkbox.checked;
  sbClient.from('leaders_checklist').update({checked:checked}).eq('id',itemId).then(function(res){
    if(res.error){alert('更新エラー');checkbox.checked=!checked;return;}
    // チェック状態をその場で反映（リロードなし）
    var lbl=document.getElementById('cl-label-'+itemId);
    if(lbl){
      if(checked) lbl.classList.add('checked');
      else lbl.classList.remove('checked');
    }
  });
}
function showAlert(id,type,msg){
  var el=document.getElementById(id);if(!el)return;
  el.innerHTML='<div class="alert alert-'+type+'">'+msg+'</div>';
  if(type==='success')setTimeout(function(){el.innerHTML='';},3000);
}
function esc(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
</script>
